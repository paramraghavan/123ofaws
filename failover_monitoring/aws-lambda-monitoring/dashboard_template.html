<!DOCTYPE html>
<html>
<head>
    <title>AWS Monitoring Dashboard</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        h1 {
            color: #232f3e;
            border-bottom: 3px solid #ff9900;
            padding-bottom: 15px;
            margin-bottom: 10px;
            font-size: 28px;
        }

        h2 {
            color: #232f3e;
            margin-top: 35px;
            margin-bottom: 15px;
            font-size: 20px;
            border-left: 4px solid #ff9900;
            padding-left: 10px;
        }

        .timestamp {
            color: #666;
            font-size: 14px;
            margin: 15px 0;
            padding: 10px;
            background-color: #f5f5f5;
            border-radius: 4px;
            display: inline-block;
        }

        .status-ok {
            color: #28a745;
            font-weight: bold;
            background-color: #d4edda;
            padding: 2px 8px;
            border-radius: 3px;
        }

        .status-fail {
            color: #dc3545;
            font-weight: bold;
            background-color: #f8d7da;
            padding: 2px 8px;
            border-radius: 3px;
        }

        .status-unknown {
            color: #856404;
            font-weight: bold;
            background-color: #fff3cd;
            padding: 2px 8px;
            border-radius: 3px;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            margin: 20px 0;
            font-size: 14px;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 12px 15px;
            text-align: left;
        }

        th {
            background-color: #232f3e;
            color: white;
            font-weight: bold;
            position: sticky;
            top: 0;
        }

        tr:nth-child(even) {
            background-color: #f9f9f9;
        }

        tr:hover {
            background-color: #f0f0f0;
            transition: background-color 0.2s ease;
        }

        .no-data {
            color: #999;
            font-style: italic;
            padding: 30px 20px;
            text-align: center;
            background-color: #f9f9f9;
            border-radius: 4px;
        }

        .error {
            background-color: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 4px;
            margin: 15px 0;
            border-left: 4px solid #dc3545;
        }

        .refresh-info {
            color: #666;
            font-size: 12px;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #ddd;
            display: block;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin: 25px 0;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .stat-card .number {
            font-size: 32px;
            font-weight: bold;
            margin: 10px 0;
        }

        .stat-card .label {
            font-size: 14px;
            opacity: 0.9;
        }

        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }

            h1 {
                font-size: 22px;
            }

            h2 {
                font-size: 16px;
            }

            th, td {
                padding: 8px 10px;
                font-size: 12px;
            }

            .stats {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 AWS Resource Monitoring Dashboard</h1>
        <div class="timestamp">Last Updated: <span id="timestamp">Loading...</span></div>

        <div class="stats" id="stats-container"></div>

        <h2>S3 Buckets</h2>
        <table id="s3-table"></table>

        <h2>EC2 Instances</h2>
        <table id="ec2-table"></table>

        <h2>EMR Clusters</h2>
        <table id="emr-table"></table>

        <p class="refresh-info">
            ⟳ Page auto-refreshes every 60 seconds
            <br>
            Last refresh: <span id="last-refresh">Now</span>
        </p>
    </div>

    <script>
        const status = {{STATUS_JSON}};

        // Display timestamp
        document.getElementById('timestamp').textContent = status.timestamp || 'N/A';
        document.getElementById('last-refresh').textContent = new Date().toLocaleTimeString();

        // Calculate stats
        const s3Count = (status.s3_buckets || []).length;
        const s3Healthy = (status.s3_buckets || []).filter(b => b.status === 'available').length;
        const ec2Count = (status.ec2_instances || []).length;
        const ec2Healthy = (status.ec2_instances || []).filter(i => i.state === 'running').length;
        const emrCount = (status.emr_clusters || []).length;
        const emrHealthy = (status.emr_clusters || []).filter(c => c.status === 'WAITING' || c.status === 'RUNNING').length;

        // Render stats
        const statsHtml = `
            <div class="stat-card">
                <div class="label">S3 Buckets</div>
                <div class="number">${s3Healthy}/${s3Count}</div>
            </div>
            <div class="stat-card">
                <div class="label">EC2 Instances</div>
                <div class="number">${ec2Healthy}/${ec2Count}</div>
            </div>
            <div class="stat-card">
                <div class="label">EMR Clusters</div>
                <div class="number">${emrHealthy}/${emrCount}</div>
            </div>
        `;
        document.getElementById('stats-container').innerHTML = statsHtml;

        // Render tables
        if (status.error) {
            const errorDiv = document.createElement('div');
            errorDiv.className = 'error';
            errorDiv.innerHTML = '⚠️ <strong>Error:</strong> ' + status.error;
            document.querySelector('.container').insertBefore(errorDiv, document.querySelector('h2'));
        } else {
            renderTable('s3-table', status.s3_buckets || [], ['name', 'status', 'region']);
            renderTable('ec2-table', status.ec2_instances || [], ['id', 'state', 'type', 'az']);
            renderTable('emr-table', status.emr_clusters || [], ['id', 'name', 'status']);
        }

        function renderTable(tableId, data, columns) {
            const table = document.getElementById(tableId);

            if (data.length === 0) {
                table.innerHTML = `<tr><td class="no-data" colspan="${columns.length}">📭 No resources found</td></tr>`;
                return;
            }

            let html = '<tr>';
            columns.forEach(col => html += `<th>${col}</th>`);
            html += '</tr>';

            data.forEach(row => {
                html += '<tr>';
                columns.forEach(col => {
                    let value = row[col];
                    if (value === undefined || value === null) {
                        value = '-';
                    }

                    const statusValues = ['available', 'running', 'ok', 'WAITING', 'RUNNING'];
                    const failureValues = ['failed', 'stopped', 'terminated', 'TERMINATED', 'TERMINATED_WITH_ERRORS', 'TERMINATING'];
                    let cssClass = 'status-unknown';

                    if (statusValues.includes(String(value))) {
                        cssClass = 'status-ok';
                    } else if (failureValues.includes(String(value))) {
                        cssClass = 'status-fail';
                    }

                    html += `<td class="${cssClass}">${value}</td>`;
                });
                html += '</tr>';
            });

            table.innerHTML = html;
        }

        // Auto-refresh every 60 seconds
        setTimeout(() => location.reload(), 60000);
    </script>
</body>
</html>
